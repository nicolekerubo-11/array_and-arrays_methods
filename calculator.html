<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sleek Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="card calc">
      <div class="topbar">
        <div class="brand">
          <div class="logo">C</div>
          <div>
            <h1> SLEEK CALC</h1>
            <p>fast — pretty — responsive</p>
          </div>
        </div>

        <div class="kbd-helpers">
          <div class="chip">Keyboard supported</div>
          <button id="themeToggle" class="chip" title="Toggle theme">Toggle theme</button>
        </div>
      </div>

      <div class="display" id="display">
        <div class="expression" id="expression">0</div>
        <div class="result" id="result">0</div>
      </div>

      <div class="keys" role="group" aria-label="calculator keys">
        <button class="key" data-action="clear">C</button>
        <button class="key" data-action="back">⌫</button>
        <button class="key" data-value="%">%</button>
        <button class="key op" data-value="/">÷</button>

        <button class="key" data-value="7">7</button>
        <button class="key" data-value="8">8</button>
        <button class="key" data-value="9">9</button>
        <button class="key op" data-value="*">×</button>

        <button class="key" data-value="4">4</button>
        <button class="key" data-value="5">5</button>
        <button class="key" data-value="6">6</button>
        <button class="key op" data-value="-">−</button>

        <button class="key" data-value="1">1</button>
        <button class="key" data-value="2">2</button>
        <button class="key" data-value="3">3</button>
        <button class="key op" data-value="+">+</button>

        <button class="key wide" data-value="0">0</button>
        <button class="key" data-value=".">.</button>
        <button class="key op" data-action="equals">=</button>
      </div>

      <div class="footer">
        <small>Tip: press Enter to evaluate</small>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="chip" id="copyBtn">Copy</button>
          <button class="chip" id="clearHistory">Clear history</button>
        </div>
      </div>
    </div>

    <div class="card side">
      <h3>History</h3>
      <div class="history" id="history"></div>

      <div style="display:flex;flex-direction:column;gap:8px;margin-top:auto">
        <div class="controls">
          <button class="chip" id="pasteExpr">Paste expression</button>
          <button class="chip" id="insertPar">( )</button>
        </div>
        <small style="color:var(--muted)">Built with care • Accessible • Works offline</small>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
